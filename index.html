        darkMode: 'class',
      }

{

<style>
.scrollbar-hide::-webkit-scrollbar {
    display: none;
}
.scrollbar-hide {
    -ms-overflow-style: none;
    scrollbar-width: none;
}
body {
    font-family: 'Inter', sans-serif;
}
.drop-orb {
    position: absolute;
    width: 60px;
    height: 60px;
    background-color: rgba(255, 255, 255, 0.2);
    border: 2px solid rgba(255, 255, 255, 0.8);
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    pointer-events: none;
    z-index: 10;
    backdrop-filter: blur(8px);
    box-shadow: 
        0 0 10px rgba(255, 255, 255, 0.7),
        0 0 25px rgba(255, 255, 255, 0.5),
        0 0 50px rgba(59, 130, 246, 0.6);
    transition: opacity 0.2s ease-out, transform 0.2s ease-out;
    opacity: 0;
}

.drop-orb::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 2px dashed rgba(255, 255, 255, 0.8);
    transform: translate(-50%, -50%) scale(1);
    opacity: 0;
    pointer-events: none;
}

@keyframes pulse-orb {
    0% {
        box-shadow: 
            0 0 10px rgba(255, 255, 255, 0.7),
            0 0 25px rgba(255, 255, 255, 0.5),
            0 0 50px rgba(59, 130, 246, 0.6),
            inset 0 0 15px rgba(255, 255, 255, 0.8);
        transform: translate(-50%, -50%) scale(1);
    }
    50% {
        box-shadow: 
            0 0 15px rgba(255, 255, 255, 0.9),
            0 0 35px rgba(255, 255, 255, 0.7),
            0 0 70px rgba(59, 130, 246, 0.8),
            inset 0 0 25px rgba(255, 255, 255, 1);
        transform: translate(-50%, -50%) scale(1.1);
    }
    100% {
        box-shadow: 
            0 0 10px rgba(255, 255, 255, 0.7),
            0 0 25px rgba(255, 255, 255, 0.5),
            0 0 50px rgba(59, 130, 246, 0.6),
            inset 0 0 15px rgba(255, 255, 255, 0.8);
        transform: translate(-50%, -50%) scale(1);
    }
}

@keyframes ripple-orb {
    0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
    }
    100% {
        transform: translate(-50%, -50%) scale(2.5);
        opacity: 0;
    }
}

.is-dragging-over .drop-orb {
    opacity: 1;
    animation: pulse-orb 1.5s infinite ease-in-out;
}

.is-dragging-over .drop-orb::before {
    animation: ripple-orb 1.5s infinite cubic-bezier(0.0, 0, 0.2, 1);
}
</style>
<link rel="stylesheet" href="/index.css">
</head>
